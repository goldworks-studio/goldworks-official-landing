name: Deploy Next.js site to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve base path
        shell: bash
        env:
          CUSTOM_PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          if [ -n "$CUSTOM_PAGES_BASE_PATH" ]; then
            echo "PAGES_BASE_PATH=$CUSTOM_PAGES_BASE_PATH" >> "$GITHUB_ENV"
            exit 0
          fi

          repo_name="${GITHUB_REPOSITORY#*/}"

          if [[ "$repo_name" == *.github.io ]]; then
            echo "PAGES_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "PAGES_BASE_PATH=/$repo_name" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_OUTPUT_MODE: "export"
        run: npm run build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    if: github.ref_name == github.event.repository.default_branch
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
